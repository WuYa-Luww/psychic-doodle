<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 嘎嘎 AI 医疗助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-zinc-400 antialiased flex items-center justify-center">
    <!-- 紫色弥散光 -->
    <div class="fixed top-0 right-0 w-[600px] h-[600px] pointer-events-none"
         style="background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1) 0%, transparent 70%);"></div>

    <!-- 登录/注册卡片 -->
    <div class="w-full max-w-md bg-zinc-900/50 backdrop-blur-xl border border-zinc-800 rounded-2xl shadow-2xl relative z-10">
        <div class="p-8">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-semibold text-white tracking-wide">嘎嘎 AI 医疗助手</h1>
                <p class="text-sm text-zinc-500 mt-2">您的智能健康管理伙伴</p>
            </div>

            <!-- 切换标签 -->
            <div class="flex mb-6 bg-zinc-800/50 rounded-lg p-1">
                <button id="loginTab" onclick="switchTab('login')"
                    class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all bg-zinc-100 text-zinc-900">
                    登录
                </button>
                <button id="registerTab" onclick="switchTab('register')"
                    class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all text-zinc-400 hover:text-zinc-200">
                    注册
                </button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">用户名</label>
                    <input type="text" id="loginUsername" required
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">密码</label>
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请输入密码">
                </div>
                <button type="submit"
                    class="w-full py-2.5 bg-zinc-100 text-zinc-900 font-medium rounded-lg hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300">
                    登录
                </button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">用户名</label>
                    <input type="text" id="registerUsername" required
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">昵称</label>
                    <input type="text" id="registerNickname"
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请输入昵称（可选）">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">密码</label>
                    <input type="password" id="registerPassword" required
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请输入密码">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-1">确认密码</label>
                    <input type="password" id="registerConfirmPassword" required
                        class="w-full px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600"
                        placeholder="请再次输入密码">
                </div>
                <button type="submit"
                    class="w-full py-2.5 bg-zinc-100 text-zinc-900 font-medium rounded-lg hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300">
                    注册
                </button>
            </form>

            <!-- 错误提示 -->
            <div id="errorMessage" class="mt-4 text-red-400 text-sm text-center hidden"></div>

            <!-- 返回主页 -->
            <div class="mt-6 text-center">
                <a href="/" class="text-sm text-zinc-500 hover:text-zinc-300 transition-colors">
                    ← 返回主页
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.classList.add('hidden');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('bg-zinc-100', 'text-zinc-900');
                loginTab.classList.remove('text-zinc-400');
                registerTab.classList.remove('bg-zinc-100', 'text-zinc-900');
                registerTab.classList.add('text-zinc-400');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('bg-zinc-100', 'text-zinc-900');
                registerTab.classList.remove('text-zinc-400');
                loginTab.classList.remove('bg-zinc-100', 'text-zinc-900');
                loginTab.classList.add('text-zinc-400');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorMessage = document.getElementById('errorMessage');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/index.html';
                } else {
                    errorMessage.textContent = data.error || '登录失败';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = '网络错误，请稍后重试';
                errorMessage.classList.remove('hidden');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password !== confirmPassword) {
                errorMessage.textContent = '两次密码输入不一致';
                errorMessage.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, confirmPassword, nickname })
                });

                const data = await response.json();

                if (response.ok) {
                    // 注册成功后自动登录
                    const loginResponse = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const loginData = await loginResponse.json();
                    if (loginResponse.ok) {
                        localStorage.setItem('token', loginData.token);
                        window.location.href = '/index.html';
                    }
                } else {
                    errorMessage.textContent = data.error || '注册失败';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = '网络错误，请稍后重试';
                errorMessage.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
