<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗资讯大屏 - 嘎嘎 AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        @keyframes heartbeat-flow { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -200; } }
        .heartbeat-line { animation: heartbeat-flow 2s linear infinite; }
        /* 右下角头像 */
        .bottom-right-avatar {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .bottom-right-avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 24px rgba(168, 85, 247, 0.4);
        }
        .bottom-right-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Markdown content styles */
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content p {
            margin: 0.5em 0;
        }
        .markdown-content strong {
            color: #e4e4e7;
            font-weight: 600;
        }
        .markdown-content ol, .markdown-content ul {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .markdown-content li {
            margin: 0.3em 0;
        }
        .markdown-content code {
            background: rgba(0,0,0,0.3);
            padding: 0.1em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .markdown-content pre {
            background: rgba(0,0,0,0.3);
            padding: 0.8em;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: #fff;
            margin: 0.8em 0 0.4em 0;
        }
        .markdown-content h1 { font-size: 1.4em; }
        .markdown-content h2 { font-size: 1.2em; }
        .markdown-content h3 { font-size: 1.1em; }
        .markdown-content blockquote {
            border-left: 3px solid #71717a;
            padding-left: 1em;
            margin: 0.5em 0;
            color: #a1a1aa;
        }
        /* 流式输出光标动画 */
        .streaming-cursor {
            animation: blink 1s step-end infinite;
            color: #a78bfa;
            font-weight: bold;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        /* 通知弹窗动画 */
        .notification-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* 历史对话区域样式 */
        .history-section {
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding-top: 12px;
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .history-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.92);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 180px;
            overflow-y: auto;
        }
        .history-item {
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.92);
        }
        .history-item.active {
            background: rgba(124,92,255,0.18);
            border-color: rgba(124,92,255,0.35);
            color: rgba(255,255,255,0.92);
        }
        .history-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-item-time {
            font-size: 10px;
            color: rgba(255,255,255,0.65);
            opacity: 0.7;
        }
        .history-item-delete {
            opacity: 0;
            padding: 2px 4px;
            border-radius: 4px;
            color: #ff4d4f;
            font-size: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .history-item:hover .history-item-delete {
            opacity: 1;
        }
        .history-item-delete:hover {
            background: rgba(255,77,79,0.2);
        }
        .history-empty {
            color: rgba(255,255,255,0.65);
            font-size: 12px;
            text-align: center;
            padding: 12px 0;
        }
        .new-chat-btn {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.12);
            background: transparent;
            color: rgba(255,255,255,0.65);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .new-chat-btn:hover {
            border-color: #7c5cff;
            color: #7c5cff;
            background: rgba(124,92,255,0.1);
        }
        /* 空状态水印背景字 */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--muted);
            pointer-events: none;
            opacity: 0.4;
            font-size: 16px;
            line-height: 1.6;
            user-select: none;
            transition: opacity 0.3s ease;
        }
        .empty-state.hidden {
            opacity: 0;
        }
        .chat-container {
            position: relative;
            min-height: 400px;
        }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-zinc-400 antialiased overflow-hidden">
    <!-- 紫色弥散光 -->
    <div class="fixed top-0 right-0 w-[600px] h-[600px] pointer-events-none"
         style="background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1) 0%, transparent 70%);"></div>

    <!-- 顶部导航栏 -->
    <div class="fixed top-0 left-0 right-0 z-20 bg-zinc-900/80 backdrop-blur-xl border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <h1 class="text-lg font-semibold text-white tracking-wide">嘎嘎 AI 医疗助手</h1>
            <div class="flex items-center gap-4">
                <button onclick="openPdfUpload()" class="px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    上传 PDF
                </button>
                <a href="/medication-calendar.html" class="px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    用药日历
                </a>
                <button onclick="handleLogout()" class="px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white transition-all">
                    退出登录
                </button>
            </div>
        </div>
    </div>

    <!-- 背景心率波形图 -->
    <div class="fixed inset-0 flex items-center justify-center pointer-events-none opacity-20">
        <svg width="100%" height="400" viewBox="0 0 1200 400" preserveAspectRatio="none">
            <path class="heartbeat-line" d="M0,200 L100,200 L150,200 L180,80 L210,320 L240,200 L300,200 L400,200 L430,80 L460,320 L490,200 L600,200 L700,200 L730,80 L760,320 L790,200 L900,200 L1000,200 L1030,80 L1060,320 L1090,200 L1200,200"
                  fill="none" stroke="#4ade80" stroke-width="3" stroke-dasharray="200" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- 医疗资讯展示层 -->
    <div id="medicalLayer" class="min-h-screen flex items-center justify-center p-8 relative z-10 transition-all duration-500">
        <div class="w-full max-w-4xl bg-zinc-900/50 backdrop-blur-xl border border-zinc-800 rounded-2xl">
            <div class="p-8">
                <h1 class="text-2xl font-semibold text-white tracking-wide mb-8">医疗资讯大屏</h1>
                <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4 transition-all duration-500">
                    <div class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-5 hover:border-zinc-600 transition-colors">
                        <div class="text-xs text-zinc-500 tracking-wide mb-2">2024.03.15</div>
                        <h3 class="text-white font-medium tracking-wide">基因组学突破</h3>
                        <p class="text-sm text-zinc-500 mt-2 tracking-wide">CRISPR 基因编辑技术在遗传病治疗领域取得重大进展</p>
                    </div>
                    <div class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-5 hover:border-zinc-600 transition-colors">
                        <div class="text-xs text-zinc-500 tracking-wide mb-2">2024.03.14</div>
                        <h3 class="text-white font-medium tracking-wide">AI 辅助诊断现状</h3>
                        <p class="text-sm text-zinc-500 mt-2 tracking-wide">深度学习模型在医学影像识别准确率突破 97%</p>
                    </div>
                    <div class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-5 hover:border-zinc-600 transition-colors">
                        <div class="text-xs text-zinc-500 tracking-wide mb-2">2024.03.13</div>
                        <h3 class="text-white font-medium tracking-wide">远程医疗新规</h3>
                        <p class="text-sm text-zinc-500 mt-2 tracking-wide">国家卫健委发布互联网诊疗质量管理新规范</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右下角头像 - 医疗助手入口 -->
    <div class="bottom-right-avatar" title="点击与嘎嘎 AI 对话" onclick="openAI()">
        <img src="/img.png" alt="嘎嘎 AI 助手">
    </div>

    <!-- 服药提醒通知 -->
    <div id="medicationNotification" class="fixed top-20 right-6 z-50 hidden notification-slide-in">
        <div class="bg-zinc-900 border border-purple-500/50 rounded-xl p-4 shadow-2xl max-w-sm">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center flex-shrink-0 animate-pulse">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <h4 class="text-white font-medium">服药提醒</h4>
                    <p id="notificationText" class="text-sm text-zinc-400 mt-1"></p>
                    <div class="flex gap-2 mt-3">
                        <button onclick="confirmMedication()" class="px-3 py-1.5 bg-green-600 hover:bg-green-500 text-white text-sm rounded-lg transition-colors">已服药</button>
                        <button onclick="skipMedication()" class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 text-zinc-300 text-sm rounded-lg transition-colors">跳过</button>
                        <button onclick="closeMedicationNotification()" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 text-sm rounded-lg transition-colors">稍后</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF 上传模态框 -->
    <div id="pdfUploadModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePdfUpload()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl">
            <div class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-white">上传 PDF 文档</h3>
                <button onclick="closePdfUpload()" class="text-zinc-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div id="dropZone" class="border-2 border-dashed border-zinc-600 rounded-xl p-8 text-center hover:border-zinc-500 transition-colors cursor-pointer"
                     onclick="document.getElementById('pdfFileInput').click()">
                    <svg class="w-12 h-12 mx-auto text-zinc-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-zinc-400 mb-1">拖拽 PDF 文件到此处，或点击选择</p>
                    <p class="text-xs text-zinc-500">支持 PDF 格式，文档将自动切分存入知识库</p>
                </div>
                <input type="file" id="pdfFileInput" accept=".pdf" class="hidden" onchange="handleFileSelect(this.files[0])">
                <p id="fileNameDisplay" class="mt-3 text-sm text-zinc-400 hidden"></p>
                <div id="uploadProgress" class="mt-4 hidden">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 h-2 bg-zinc-800 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full bg-purple-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <span id="progressText" class="text-xs text-zinc-400">0%</span>
                    </div>
                </div>
                <div id="uploadResult" class="mt-4 hidden p-4 rounded-xl"></div>
                <div class="mt-4 flex justify-center">
                    <a href="/api/pdf/template" id="downloadTemplateBtn"
                       class="px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        下载示例 PDF
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 交互层 -->
    <div id="aiLayer" class="fixed inset-0 flex items-center justify-center p-8 z-30 pointer-events-none opacity-0 translate-y-8 transition-all duration-500">
        <div class="w-full max-w-5xl h-[600px] bg-zinc-900/80 backdrop-blur-xl border border-zinc-800 rounded-2xl shadow-2xl pointer-events-auto flex overflow-hidden">
            <!-- 左侧边栏：历史对话 -->
            <aside class="w-72 flex-shrink-0 bg-zinc-900/50 border-r border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800">
                    <h2 class="text-base font-semibold text-white tracking-wide">历史对话</h2>
                </div>
                <div class="p-3">
                    <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
                </div>
                <div class="flex-1 overflow-y-auto px-3 pb-3" id="historyList">
                    <div class="history-empty">暂无历史对话</div>
                </div>
            </aside>

            <!-- 右侧：聊天区域 -->
            <main class="flex-1 flex flex-col min-w-0">
                <div class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-semibold text-white tracking-wide">嘎嘎 AI 助手</h2>
                        <p class="text-sm text-zinc-500 mt-1">您的智能医疗助手</p>
                    </div>
                </div>
                <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- 空状态占位符 -->
                    <div id="emptyPlaceholder" class="flex items-center justify-center h-full">
                        <p class="text-zinc-600 text-lg italic text-center select-none">
                            我是嘎嘎，你的智能医疗助手。<br>有什么可以帮您？
                        </p>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-zinc-800 flex gap-3">
                    <input type="text" id="messageInput" placeholder="请输入您的问题..."
                        class="flex-1 px-4 py-2.5 bg-zinc-800 border border-zinc-700 rounded-lg text-zinc-200 placeholder-zinc-500 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-600">
                    <button onclick="sendMessage()" class="px-5 py-2.5 bg-zinc-100 text-zinc-900 font-medium rounded-lg hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all duration-300">发送</button>
                    <button onclick="closeAI()" class="px-5 py-2.5 bg-zinc-800 text-zinc-300 font-medium rounded-lg border border-zinc-700 hover:border-zinc-600 transition-all duration-300">返回</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const medicalLayer = document.getElementById('medicalLayer');
        const aiLayer = document.getElementById('aiLayer');
        const cardsContainer = document.getElementById('cardsContainer');
        const chatMessages = document.getElementById('chatMessages');
        const emptyPlaceholder = document.getElementById('emptyPlaceholder');
        let isOpen = false;

        marked.setOptions({ breaks: true, gfm: true });

        // ============ 历史对话状态管理 ============
        let currentUserId = 'default_user';
        let currentSessionId = localStorage.getItem('medical_session_id') || null;
        let sessions = [];

        // ============ JWT Token 解析工具 ============
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // ============ 历史对话 API ============
        async function loadSessions() {
            try {
                const token = localStorage.getItem('token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const resp = await fetch(`/api/memory/sessions?userId=${encodeURIComponent(currentUserId)}`, { headers });
                if (resp.ok) {
                    sessions = await resp.json();
                    renderHistoryList();
                }
            } catch (e) {
                console.error('加载历史对话失败:', e);
            }
        }

        async function loadSessionDetail(sessionId) {
            try {
                const token = localStorage.getItem('token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const resp = await fetch(`/api/memory/session/${encodeURIComponent(sessionId)}?limit=50&offset=0`, { headers });
                if (resp.ok) {
                    return await resp.json();
                }
            } catch (e) {
                console.error('加载会话详情失败:', e);
            }
            return null;
        }

        async function deleteSession(sessionId, event) {
            event.stopPropagation();
            if (!confirm('确定要删除该会话吗？')) return;
            try {
                const token = localStorage.getItem('token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const resp = await fetch(`/api/memory/session/${encodeURIComponent(sessionId)}`, {
                    method: 'DELETE',
                    headers
                });
                if (resp.ok) {
                    if (currentSessionId === sessionId) {
                        currentSessionId = null;
                        chatMessages.innerHTML = '';
                        emptyPlaceholder.style.display = 'flex';
                    }
                    await loadSessions();
                }
            } catch (e) {
                console.error('删除会话失败:', e);
            }
        }

        async function selectSession(sessionId) {
            currentSessionId = sessionId;
            localStorage.setItem('medical_session_id', currentSessionId);
            chatMessages.innerHTML = '';
            emptyPlaceholder.style.display = 'none';

            const detail = await loadSessionDetail(sessionId);
            if (detail && detail.messages) {
                for (const msg of detail.messages) {
                    const isUser = msg.role === 'user';
                    addChatMessage(isUser ? 'user' : 'bot', msg.content);
                }
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
            renderHistoryList();
        }

        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            if (!sessions || sessions.length === 0) {
                listEl.innerHTML = '<div class="history-empty">暂无历史对话</div>';
                return;
            }

            listEl.innerHTML = sessions.map(s => {
                const timeStr = formatRelativeTime(s.lastActiveAt);
                const isActive = s.sessionId === currentSessionId ? 'active' : '';
                const escapedSessionId = escapeHtml(s.sessionId).replace(/'/g, "\\'");
                return `
                    <div class="history-item ${isActive}" onclick="selectSession('${escapedSessionId}')">
                        <span class="history-item-title">${escapeHtml(s.title || '未命名对话')}</span>
                        <span class="history-item-time">${timeStr}</span>
                        <span class="history-item-delete" onclick="deleteSession('${escapedSessionId}', event)">删除</span>
                    </div>
                `;
            }).join('');
        }

        function formatRelativeTime(timestamp) {
            if (!timestamp) return '';
            const now = Date.now();
            const diff = now - timestamp;
            const minute = 60 * 1000;
            const hour = 60 * minute;
            const day = 24 * hour;

            if (diff < minute) return '刚刚';
            if (diff < hour) return Math.floor(diff / minute) + '分钟前';
            if (diff < day) return Math.floor(diff / hour) + '小时前';
            if (diff < 7 * day) return Math.floor(diff / day) + '天前';
            return new Date(timestamp).toLocaleDateString('zh-CN');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, (m) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function newChat() {
            currentSessionId = null;
            localStorage.removeItem('medical_session_id');
            chatMessages.innerHTML = '';
            emptyPlaceholder.style.display = 'flex';
            renderHistoryList();
        }

        // ============ 聊天消息渲染 ============
        function addChatMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bgClass = role === 'user' ? 'bg-zinc-100 text-zinc-900' : 'bg-zinc-800 border border-zinc-700 text-zinc-300';
            const radiusClass = role === 'user' ? 'rounded-br-md' : 'rounded-bl-md';
            div.innerHTML = `<div class="max-w-[75%] px-4 py-3 ${bgClass} rounded-2xl ${radiusClass}"><div class="text-sm markdown-content">${role === 'user' ? escapeHtml(text) : renderMarkdown(text)}</div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============ 轮询与服药提醒（保持不变）============
        let pendingRecords = [];
        let currentPendingId = null;
        let pollingInterval = null;

        function startPolling() {
            checkPendingReminders();
            pollingInterval = setInterval(checkPendingReminders, 30000);
        }

        async function checkPendingReminders() {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const response = await fetch('/api/medication/pending', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    pendingRecords = data;
                    if (data.length > 0) {
                        showMedicationNotification(data[0]);
                    }
                }
            } catch (error) {
                console.error('轮询失败:', error);
            }
        }

        function showMedicationNotification(record) {
            currentPendingId = record.id;
            const time = record.scheduledTime ? record.scheduledTime.substring(11, 16) : '';
            document.getElementById('notificationText').textContent =
                `该服用 ${record.medicationName} ${record.dosage || ''} (${time})`;
            document.getElementById('medicationNotification').classList.remove('hidden');
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleQsGgLXk5ZlJBwWApeLmmEYGB4Cg4eaYRgYHgJ/h5pdGBgeAn+DnmEYGB4Cf4OaYRgYHgJ/h5pdGBgeAn+DnmEYGB4Cf4OaYRgYHgJ/h5pdGBgeAn+DnmEYGB4Cf4OaYRgYHgJ/h5pdGBgeAn+DnmEYGB4Cf4OaYRgYHgJ/h5pdGBgeAn+DnmEY=');
                audio.volume = 0.5;
                audio.play().catch(() => {});
            } catch (e) {}
        }

        function closeMedicationNotification() {
            document.getElementById('medicationNotification').classList.add('hidden');
            currentPendingId = null;
        }

        async function confirmMedication() {
            if (!currentPendingId) return;
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/medication/records/${currentPendingId}/confirm`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    closeMedicationNotification();
                    checkPendingReminders();
                }
            } catch (error) {
                alert('操作失败');
            }
        }

        async function skipMedication() {
            if (!currentPendingId) return;
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/medication/records/${currentPendingId}/skip`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    closeMedicationNotification();
                    checkPendingReminders();
                }
            } catch (error) {
                alert('操作失败');
            }
        }

        startPolling();

        function openAI() {
            if (isOpen) return;
            isOpen = true;
            cardsContainer.classList.add('opacity-0');
            setTimeout(() => {
                medicalLayer.classList.add('opacity-0', 'blur-sm');
                aiLayer.classList.remove('opacity-0', 'translate-y-8');
                aiLayer.classList.add('opacity-100', 'translate-y-0');
            }, 200);
        }

        function closeAI() {
            isOpen = false;
            aiLayer.classList.add('opacity-0', 'translate-y-8');
            aiLayer.classList.remove('opacity-100', 'translate-y-0');
            setTimeout(() => {
                medicalLayer.classList.remove('opacity-0', 'blur-sm');
                cardsContainer.classList.remove('opacity-0');
            }, 200);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            let escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            return marked.parse(escaped);
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            if (emptyPlaceholder) {
                emptyPlaceholder.style.display = 'none';
            }

            addChatMessage('user', message);
            input.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const aiMsgId = 'ai-msg-' + Date.now();
            chatMessages.insertAdjacentHTML('beforeend', `<div id="${aiMsgId}" class="flex justify-start"><div class="max-w-[75%] px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-2xl rounded-bl-md"><div class="text-sm text-zinc-300 markdown-content"><span class="streaming-cursor">▊</span></div></div></div>`);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            let fullResponse = '';
            const contentDiv = document.getElementById(aiMsgId).querySelector('.markdown-content');
            const cursorEl = contentDiv.querySelector('.streaming-cursor');

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/stream/medical/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        sessionId: currentSessionId || null,
                        message: message
                    })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let isCompleted = false;
                let dataBuffer = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (value) buffer += decoder.decode(value, { stream: true });

                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    let currentEvent = 'message';

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            if (dataBuffer.length > 0) {
                                processData(currentEvent, dataBuffer.join('\n'));
                                dataBuffer = [];
                            }
                            currentEvent = line.substring(6).trim();
                        } else if (line.startsWith('data:')) {
                            let data = line.substring(5);
                            if (data.startsWith(' ')) data = data.substring(1);
                            dataBuffer.push(data);
                        } else if (line === '') {
                            if (dataBuffer.length > 0) {
                                processData(currentEvent, dataBuffer.join('\n'));
                                dataBuffer = [];
                            }
                            currentEvent = 'message';
                        }
                    }

                    if (done || isCompleted) {
                        if (dataBuffer.length > 0) {
                            processData(currentEvent, dataBuffer.join('\n'));
                        }
                        if (!isCompleted) {
                            cursorEl.remove();
                            contentDiv.innerHTML = renderMarkdown(fullResponse);
                        }
                        break;
                    }
                }

                function processData(event, data) {
                    if (event === 'message') {
                        fullResponse += data;
                        contentDiv.textContent = fullResponse;
                        contentDiv.appendChild(cursorEl);
                    } else if (event === 'done') {
                        isCompleted = true;
                        cursorEl.remove();
                        contentDiv.innerHTML = renderMarkdown(fullResponse);
                        // 从 done 事件的 data 中提取 sessionId（如果返回的是 JSON）
                        try {
                            const chatResponse = JSON.parse(data);
                            if (chatResponse.sessionId) {
                                currentSessionId = chatResponse.sessionId;
                                localStorage.setItem('medical_session_id', currentSessionId);
                            }
                        } catch (e) {
                            // done 事件的 data 可能为空字符串，忽略解析错误
                        }
                        // 刷新历史对话列表
                        loadSessions();
                    } else if (event === 'emergency') {
                        chatMessages.insertAdjacentHTML('beforeend', `<div class="flex justify-start"><div class="max-w-[75%] px-4 py-3 bg-red-900/50 border border-red-700 rounded-2xl rounded-bl-md"><p class="text-sm text-red-200">⚠️ ${escapeHtml(data)}</p></div></div>`);
                    } else if (event === 'emergency_append') {
                        fullResponse += data;
                        if (isCompleted) contentDiv.innerHTML = renderMarkdown(fullResponse);
                    } else if (event === 'error') {
                        cursorEl.remove();
                        contentDiv.innerHTML = `<span class="text-red-400">错误: ${escapeHtml(data)}</span>`;
                    }
                }
            } catch (error) {
                cursorEl.remove();
                contentDiv.innerHTML = `<span class="text-red-400">请求失败：${escapeHtml(error.message)}</span>`;
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
            document.getElementById('messageInput').focus();
        }

        // ============ 事件绑定 ============
        medicalLayer.addEventListener('click', openAI);

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('newChatBtn').addEventListener('click', newChat);

        // ============ 初始化 ============
        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // 从 JWT token 解析 userId
            const jwtPayload = parseJwt(token);
            if (jwtPayload && jwtPayload.sub) {
                currentUserId = jwtPayload.sub;
            }

            // 先加载历史对话列表
            await loadSessions();

            // 再恢复会话（根据 localStorage 中的 sessionId）
            if (currentSessionId) {
                // 检查该 sessionId 是否存在于列表中
                const sessionExists = sessions.some(s => s.sessionId === currentSessionId);
                if (sessionExists) {
                    await selectSession(currentSessionId);
                } else {
                    // sessionId 已过期/不存在，显示空状态
                    currentSessionId = null;
                    localStorage.removeItem('medical_session_id');
                    emptyPlaceholder.style.display = 'flex';
                }
            } else {
                emptyPlaceholder.style.display = 'flex';
            }
        }

        init();

        // ============ 其他功能（PDF、服药提醒等）保持不变 ============

        // PDF 上传相关
        function openPdfUpload() {
            document.getElementById('pdfUploadModal').classList.remove('hidden');
            resetUploadState();
        }

        function closePdfUpload() {
            document.getElementById('pdfUploadModal').classList.add('hidden');
        }

        function resetUploadState() {
            document.getElementById('pdfFileInput').value = '';
            document.getElementById('fileNameDisplay').classList.add('hidden');
            document.getElementById('uploadProgress').classList.add('hidden');
            document.getElementById('uploadResult').classList.add('hidden');
        }

        function handleFileSelect(file) {
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showUploadResult(false, '仅支持 PDF 格式文件');
                return;
            }

            document.getElementById('fileNameDisplay').textContent = '已选择: ' + file.name;
            document.getElementById('fileNameDisplay').classList.remove('hidden');

            uploadPdf(file);
        }

        async function uploadPdf(file) {
            const progressDiv = document.getElementById('uploadProgress');
            const resultDiv = document.getElementById('uploadResult');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            progressDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            // 模拟进度
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress = Math.min(progress + Math.random() * 15, 90);
                progressBar.style.width = progress + '%';
                progressText.textContent = Math.round(progress) + '%';
            }, 200);

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/pdf/upload', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                progressText.textContent = '100%';

                const result = await response.json();

                if (result.success) {
                    showUploadResult(true, '上传成功！文档已切分为 ' + result.totalChunks + ' 个片段存入知识库');
                } else {
                    showUploadResult(false, result.message || '上传失败');
                }
            } catch (error) {
                clearInterval(progressInterval);
                showUploadResult(false, '上传失败: ' + error.message);
            }
        }

        function showUploadResult(success, message) {
            const resultDiv = document.getElementById('uploadResult');
            resultDiv.classList.remove('hidden', 'bg-green-900/30', 'bg-red-900/30');

            if (success) {
                resultDiv.classList.add('bg-green-900/30', 'border', 'border-green-700');
                resultDiv.innerHTML = '<p class="text-green-400 text-sm flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' + message + '</p>';
            } else {
                resultDiv.classList.add('bg-red-900/30', 'border', 'border-red-700');
                resultDiv.innerHTML = '<p class="text-red-400 text-sm flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>' + message + '</p>';
            }
        }

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-purple-500', 'bg-purple-500/5');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-purple-500', 'bg-purple-500/5');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-purple-500', 'bg-purple-500/5');
            const file = e.dataTransfer.files[0];
            if (file) handleFileSelect(file);
        });

        // 退出登录
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('medical_session_id');
            window.location.href = '/login.html';
        }
    </script>
