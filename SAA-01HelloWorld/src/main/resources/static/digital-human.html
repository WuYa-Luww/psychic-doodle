<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字人-乌鸦</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.65);
      --accent: #7c5cff;
      --danger: #ff4d4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(124, 92, 255, 0.25), transparent 60%),
        radial-gradient(800px 500px at 80% 20%, rgba(0, 200, 255, 0.14), transparent 60%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .left {
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .subtitle { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .avatar {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      border: 1px solid var(--border);
      background-image: url('/img.png');
      background-size: cover;
      background-position: center;
      display: grid;
      place-items: center;
      position: relative;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.18);
      color: var(--muted);
      font-size: 13px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.12);
    }
    .right {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 560px;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header .hint { color: var(--muted); font-size: 12px; }
    .chat {
      padding: 16px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
    }
    .msg {
      max-width: 86%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 14px;
    }
    .msg.user {
      margin-left: auto;
      background: rgba(124,92,255,0.18);
      border-color: rgba(124,92,255,0.35);
    }
    .msg.bot {
      margin-right: auto;
      background: rgba(255,255,255,0.06);
    }
    .footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.22);
      color: var(--text);
      outline: none;
      font-size: 14px;
      line-height: 1.4;
    }
    textarea:focus { border-color: rgba(124,92,255,0.55); }
    button {
      height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(124,92,255,0.55);
      background: rgba(124,92,255,0.28);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .error {
      color: #ffd1d1;
      background: rgba(255, 77, 79, 0.18);
      border-color: rgba(255, 77, 79, 0.35);
    }
    /* Markdown styles */
    .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 {
      margin: 8px 0;
      font-weight: 700;
      line-height: 1.3;
    }
    .msg h1 { font-size: 18px; }
    .msg h2 { font-size: 16px; }
    .msg h3 { font-size: 14px; }
    .msg ul, .msg ol {
      margin: 8px 0;
      padding-left: 20px;
    }
    .msg li { margin: 4px 0; }
    .msg code {
      padding: 2px 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      font-size: 12px;
    }
    .msg pre {
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }
    .msg pre code {
      background: none;
      padding: 0;
    }
    .msg blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--muted);
    }
    .msg a {
      color: var(--accent);
      text-decoration: none;
    }
    .msg a:hover {
      text-decoration: underline;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .right { min-height: 520px; }
    }
    /* 右下角头像 */
    .bottom-right-avatar {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--border);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 100;
      cursor: pointer;
    }
    .bottom-right-avatar:hover {
      transform: scale(1.05);
      transition: transform 0.2s ease;
    }
    .bottom-right-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card left">
      <div class="title">数字人-乌鸦</div>
      <div class="subtitle">请尽情吩咐妲己</div>
      <div class="avatar" aria-label="digital human">
        <div class="label">Digital Human</div>
      </div>
      <div class="pill"><span class="dot" id="statusDot"></span><span id="statusText">就绪</span></div>
      <div class="subtitle">
<!--        打开地址：<code>http://127.0.0.1:8002/digital-human.html</code>-->
      </div>
    </section>

    <section class="card right">
      <div class="header">
        <div>
          <div style="font-weight: 700;">对话</div>
          <div class="hint">Enter 发送；Shift+Enter 换行</div>
        </div>
        <div class="hint">接口：<code>POST /chat</code></div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="footer">
        <textarea id="input" placeholder="比如：hello"></textarea>
        <button id="sendBtn">发送</button>
      </div>
    </section>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    function addMsg(role, text, extraClass = '') {
      const div = document.createElement('div');
      div.className = `msg ${role} ${extraClass}`.trim();
      div.innerHTML = marked.parse(text);
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      statusDot.style.background = busy ? '#f59e0b' : '#22c55e';
      statusDot.style.boxShadow = busy ? '0 0 0 4px rgba(245,158,11,0.12)' : '0 0 0 4px rgba(34,197,94,0.12)';
      statusText.textContent = busy ? '生成中…' : '就绪';
    }

    async function send() {
      const text = (inputEl.value || '').trim();
      if (!text) return;

      addMsg('user', text);
      inputEl.value = '';
      setBusy(true);

      try {
        const resp = await fetch('/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: text })
        });

        const contentType = resp.headers.get('content-type') || '';
        const data = contentType.includes('application/json') ? await resp.json() : await resp.text();
        if (!resp.ok) {
          throw new Error(typeof data === 'string' ? data : JSON.stringify(data));
        }
        addMsg('bot', typeof data === 'string' ? data : JSON.stringify(data));
      } catch (e) {
        addMsg('bot', `请求失败：${e?.message || e}`, 'error');
      } finally {
        setBusy(false);
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    addMsg('bot', '你好，我是数字人-乌鸦。你的专属AI智能助手');
    inputEl.focus();
  </script>
</body>
</html>
